<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pan d' Casa</title>
  <link rel="canonical" href="https://pandcasa.com/pages/queques.html">
  <link rel="stylesheet" href="/dist/tailwind.css">
  <link rel="stylesheet" href="/css/site.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="preload" as="image" href="/assets/TardeCafe.JPG">
</head>
<body class="bg-brand-cream text-brand-cocoa font-sans antialiased selection:bg-brand-gold/20 selection:text-brand-cocoa overflow-x-hidden">
  <!-- Navbar -->
  <div data-include="/partials/site-navbar.html"></div>

  
  <main id="inicio" class="relative z-10">
    <!-- Hero -->
    <section class="pt-0 pb-12 reveal" data-reveal>
      <div class="w-full">
        <div class="relative h-80 md:h-[520px] w-full bg-brand-beige/40 border-y border-brand-caramel/15 overflow-hidden">
          <img fetchpriority="high" src="/assets/TardeCafe.JPG" alt="Pan d’ Casa" class="absolute inset-0 w-full h-full object-cover" loading="eager" decoding="async" />
          <div class="absolute inset-0 bg-brand-cocoa/70"></div>
          <div class="absolute inset-0 bg-gradient-to-tr from-brand-gold/10 via-transparent to-brand-gold2/10"></div>
          <div class="relative h-full w-full flex items-center justify-center text-center px-6">
            <div class="text-brand-cream max-w-2xl">
              <p class="text-xs uppercase tracking-[0.35em] text-brand-gold">Pan d’ Casa</p>
              <h1 class="mt-3 font-serif text-3xl md:text-5xl title-reveal">Queques</h1>
              <p class="mt-4 text-sm md:text-base text-brand-cream/85">Queques de casa, húmedos y delicados, horneados cada mañana.</p>
              <div class="mt-6 flex flex-wrap justify-center gap-3">
                <a href="/index.html" class="px-5 py-3 rounded-full bg-brand-cream text-brand-cocoa text-sm tracking-wide btn-lift focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-gold/50">Volver a inicio</a>
              </div>
            </div>
          </div>
        </div>
      </div>

    </section>

    <!-- Lista -->
    <section class="bg-brand-beige">
      <div class="max-w-6xl mx-auto px-6 lg:px-10 py-16 reveal" data-reveal>
        <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-6">
          <div>
            <p class="text-sm uppercase tracking-[0.3em] text-brand-caramel">Selección del día</p>
            <h2 class="mt-3 font-serif text-3xl md:text-4xl title-reveal">Queques boutique</h2>
          </div>
          <p class="max-w-lg text-brand-cocoa/75">Piezas curadas para hoy. Pregunta por disponibilidad y recomendaciones.</p>
        </div>
                <div class="mt-6">
          <input id="productSearch" type="search" placeholder="Buscar producto..." class="w-full rounded-2xl border border-brand-caramel/30 bg-brand-cream px-4 py-3 text-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-gold/50" />
        </div>
        <div class="mt-10">

        <div id="productGrid" data-category="queques" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <div data-include="/partials/site-footer.html"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/site.js"></script>
  <script src="../js/app.js"></script>

  

</body>
</html>
