<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pan d’ Casa | Acceso Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#ECD8B4">

  <link rel="icon" type="image/png" href="assets/Logo Pandcasa.png">
  <link rel="apple-touch-icon" href="assets/Logo Pandcasa.png">
  <link rel="stylesheet" href="/dist/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-brand-beige text-brand-cocoa font-sans antialiased min-h-screen">
  <main class="min-h-screen flex items-center justify-center px-5">
    <section class="w-full max-w-md border border-brand-caramel/30 bg-brand-cream/90 rounded-3xl p-6 text-center">
      <p class="text-[10px] uppercase tracking-[0.3em] text-brand-caramel">Pan d’ Casa</p>
      <h1 class="font-serif text-2xl mt-2">Acceso administrador</h1>
      <p class="mt-2 text-sm text-brand-cocoa/70">Inicia sesión con tu cuenta de Netlify para acceder al panel.</p>

      <button id="loginBtn" class="mt-6 px-4 py-2 rounded-full bg-brand-cocoa text-brand-cream text-xs">Iniciar sesión</button>
      <p id="loginHint" class="mt-3 text-xs text-brand-caramel"></p>

      <div class="mt-6 text-xs text-brand-caramel">
        <a href="/index.html" class="underline">Volver al sitio</a>
      </div>
    </section>
  </main>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    const hint = document.getElementById('loginHint');
    const loginBtn = document.getElementById('loginBtn');

    const goAdminIfRole = (user) => {
      if (!user) return false;
      const roles = (user.app_metadata && user.app_metadata.roles) || [];
      if (roles.includes('admin')) {
        window.location.href = '/admin/';
        return true;
      }
      hint.textContent = 'Tu usuario no tiene rol admin.';
      return false;
    };

    loginBtn?.addEventListener('click', () => {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.open('login');
      }
    });

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', (user) => {
        if (!goAdminIfRole(user)) {
          hint.textContent = 'Inicia sesión para continuar.';
        }
      });
      window.netlifyIdentity.on('login', (user) => {
        window.netlifyIdentity.close();
        goAdminIfRole(user);
      });
    }
  </script>
</body>
</html>
